name: CI
on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test -p gfold-core -p gfold-cli
      - run: cargo clippy -p gfold-core -p gfold-cli --all-targets -- -D warnings

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Build + test the wheel
        working-directory: gfold-py
        run: |
          uv venv
          uv pip install maturin pytest numpy
          uv run maturin develop
          uv run pytest -q

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      # jetli's "latest" resolves to a 2020 wasm-pack (v0.9.1) whose bundled
      # wasm-opt can't parse the wasm features current Rust emits; use a current
      # wasm-pack from crates.io instead.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build wasm, type-check + run the TypeScript smoke test
        working-directory: gfold-wasm
        run: |
          wasm-pack build --target nodejs --out-dir pkg
          npm install
          npm test   # tsc --noEmit (type-checks against pkg/*.d.ts) && tsx smoke.ts
